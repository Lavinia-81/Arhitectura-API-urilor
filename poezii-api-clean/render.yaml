# render.yaml
services:
  - type: web
    name: poezii-api
    runtime: node
    repo: https://github.com/username/poezii-api
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: poezii-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: poezii-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true  # Render generează automat un secret

  - type: postgresql
    name: poezii-db
    plan: free
    database: poeziiapi
    postgresMajorVersion: 15

  - type: redis
    name: poezii-redis
    plan: free
    maxmemoryPolicy: allkeys-lru